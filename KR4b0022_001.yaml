body:
  text: 卷一百一詩三首下流不可處君子慎厥初名高不宿著易用受侵誣前者隳官去有人適我閭田家無所有酌醴焚枯魚問我何功德三入承明廬所占於此土是謂仁智居文章不經國筐篋無尺書用等稱才學往往見歎譽避席跪自陳賤子實空虛宋人遇周客慚媿靡所如文選二十一詩紀十七年命在桑榆東岳與我期長短有常會遲速不得辭斗酒多為樂無為待來茲室廣致凝陰臺高來積陽奈何季世人侈靡在宮牆飾巧無窮極土木被朱光徵求傾四海雅意猶未康類聚二十四廣文選八詩紀十七又初學記十八引陽牆光康四韻子弟可不慎慎在選師友師友必長德中才可進誘闕初學記十八御覽四百四詩紀十七雜詩三首細微可不慎隄潰自蟻穴腠理蚤從事安復勞鍼石哲人覩未形愚夫闇明白曲突不見賓燋爛為上客思願獻良規江海倘不逆狂言雖寡善猶有如雞跖雞跖食不已齊王為肥澤類聚二十三廣文選十五詩紀十七並作雜詩散騎常師友朋夕進規獻侍中主喉舌萬機無不亂尚書統庶事官人乘法憲彤管弭納言貂璫表武弁出入承明廬車服一何煥三寺齊榮秩百僚所瞻願類聚四十五詩紀十七並作雜詩又書鈔五十八作新詩引獻一韻及亂一韻百二十七作應璩詩引亂憲弁三韻初學記十一作新詩引弁一韻又白帖二十一作應瑗詩引侍中喉舌萬機六字事文類聚新集十及合璧事類後集二十六引憲一韻少壯面目澤長老顏色麤麤醜人所惡拔白自洗蘇平生髮完全變化似浮屠醉酒巾幘落禿頂赤如壺苕溪漁隱叢話四十一作三叟詞又類聚十八作新詩引麤蘇二韻御覽三百六十四作新詩引狐一韻詩紀十七作雜詩引麤蘇二韻三叟古有行道人陌上見三叟年各百餘歲相與鋤禾莠住車問三叟何以得此壽上叟前致辭內中嫗貌醜中叟前致辭量腹節所受下叟前致辭夜臥不覆首要哉三叟言所以能長久御覽三百八十三七百六十四並作應璩詩苕溪漁隱叢話四十一作三叟詞詩紀十七作三叟又藝文類聚十八作魏應璩詩引叟莠壽三韻
