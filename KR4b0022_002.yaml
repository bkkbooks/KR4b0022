body:
  text: 卷二與曹公牋昔漢光武與戴子高有撫塵之好藝文類聚六薦和慮則牋薦和慮則牋璩聞唐堯因群士以興治齊桓假眾能以定業是故八元進則太平之化成六賢用則九合之功立切見同郡和模字慮則質性純粹體度貞正履仁蹈義動循軌禮方今海內企踵欣慕捉髮之德山林投褐思望旌弓之招實英奇敘用之時貢達進致之良秋也令夜光之璧顯價于和氏之肆千里之足定功于伯樂之庭庶有以宣明大道光益時化藝文類聚五十三薦賁伯偉牋薦賁伯偉牋璩聞景雲浮則應龍翔治道明則雋乂臻是故良哉之歌興于唐堯之世多士之頌起于周文之朝竊見太子舍人賁琳字伯偉稟性純和體素清愨宜授以千里之塗任以列曹之職藝文類聚五十三御覽六百三十二與曹昭伯牋空城寥廓所聞者悲風所見者鳥雀昔陳司空為邑宰所在幽閑獨坐愁思幸賴遊蟻以娛其意以今況之知不虛矣御覽九百四十七與劉文達書與劉文達書入作納言出臨京任富民之術日引月長藩落高峻絕穿窬之心五種別出遠水火之災農器必具無失時之闕蠶麥有苫備之用無雨溼之虞封符指期無流連之吏鰥寡狐獨蒙廩振之實加之以明擿幽微重之以秉憲不撓有司供承王命百里垂拱仰辦雖昔趙張三王之治未足以方也魏志劉馥傳僕頃倦遊談之事欲修無為之術不能與足下齊鑣騁轡爭千里之表也御覽三百五十八與滿公琰書與滿公琰書璩白昨者不遺猥見照臨雖昔侯生納顧于夷門毛公受眷于逆旅無以過也外嘉郎君謙下之德內幸頑才見誠知己歡欣踴躍情有無量是以奔騁御僕宣命周求陽書喻于詹何楊倩說于范武故使鮮魚出于潛淵芳旨發自幽巷繁俎綺錯羽爵飛騰牙曠高徽義渠哀激當此之時仲孺不辭同產之服孟公不顧尚書之期徒恨宴樂始酣白日傾夕驪駒就駕意不宣展追惟耿介迄于明發適欲遣書會承來命知諸君子復有漳渠之會夫漳渠西有伯陽之館北有曠野之望高樹翳朝雲文禽蔽綠水沙場夷敞清風肅穆是京臺之樂也得無流而不反乎適有事務須自經營不獲侍坐良增邑邑因白不悉璩白文選藝文類聚二十八與從弟君苗君冑書璩報閒者北遊喜歡無量登芒濟河曠若發矇風伯埽途雨師灑道案轡清路周望山野亦既至止酌彼春酒接武茅茨涼過大夏扶寸肴脩味踰方丈逍遙陂塘之上吟詠菀柳之下結春芳以崇佩折若華以翳日弋下高雲之鳥餌出深淵之魚蒲且讚善便嬛稱妙何其樂哉雖仲尼忘味于虞韶楚人流遯于京臺無以過也班嗣之書信不虛矣來還京都塊然獨處營宅濱洛困于囂塵思樂汶上發于寤寐昔伊尹輟耕郅惲投竿思致君于有虞濟蒸人于塗炭而吾方欲秉耒耜于山陽沈鉤緡于丹水知其不如古人遠矣然山父不貪天下之樂曾參不慕晉楚之富亦其志也前者邑人念弟無已欲州郡崇禮師官授邑誠美意也歷觀前後來入軍府至有皓首猶未遇也徒有飢寒駿奔之勞俟河之清人壽幾何且宦無金張之援遊無子孟之資而圖富貴之榮望殊異之寵是隴西之遊越人之射耳幸賴先君之靈免負擔之勤追蹤丈人畜雞種黍潛精墳籍立身揚名斯為可矣無或遊言以增邑邑郊牧之田宜以為意廣開土宇吾將老焉劉杜二生想數往來朱明之期已復至矣相見在近故不復為書慎夏自愛璩白文選文類聚二十八與侍郎曹長思書璩白足下去後甚相思想叔田有無人之歌闉闍有匪存之思風人之作豈虛也哉王肅以宿德顯授何曾以後進見拔皆鷹揚虎視有萬里之望薄援助者不能追參于高妙復斂翼于故枝塊然獨處有離群之志汲黯樂在郎署何武恥為宰相千載揆之知其有由也德非陳平門無結駟之跡學非楊雄堂無好事之客才劣仲舒無下帷之思家貧孟公無置酒之樂悲風起于閨闥紅塵蔽于机榻幸有袁生時步玉趾樵蘇不爨清談而已有似周黨之過閔子夫皮朽者毛落川涸者魚逝春生者繁華秋榮者零悴自然之數豈有恨哉聊為大弟陳其苦懷耳相還在近故不益言璩白文選與廣川長岑文瑜書璩白頃者炎旱日更增甚沙礫銷鑠草木焦卷處涼臺而有鬱蒸之煩浴寒水而有灼爛之慘宇宙雖廣無陰以憩雲漢之詩何以過此土龍矯首于玄寺泥人鶴立于闕里修之歷旬靜無徵效明勸教之術非致雨之備也知恤下民躬自暴露拜起靈壇勤亦至矣昔夏禹之解陽旴殷湯之禱桑林言未發而水旋流辭未卒而澤滂沛今者雲重積而復散雨垂落而復收得無賢聖殊品優劣異姿割髮宜及膚翦爪宜侵肌乎周征殷而年豐衛伐邢而致雨善否之應甚于影響未可以為不然也想雅思所未及謹書起予應璩白文選藝文類聚一百與劉公榦書鶉鷃棲翔鳳之條黿鼉游昇龍之淵識真者所為憤結也文選陸機吳王郎中時從梁陳作詩注與韋仲將書與韋仲將書夫以原憲縣罄之居而值皇天無已之雨室宇漸而作漏堂館洽而為泥薪芻既盡舊穀亦傾匱屠蘇發撤機㯓見謀進無顏子不改之志退無楊雄晏然之情是以懷蹙良不可堪人非神仙須仰衣食方今體寒心飢憂在旦夕而欲東希誅昌治生之物西望陵縣廚食之祿誠恐將為牛蹄中魚卒鮑氏之肆矣藝文類聚三十五初學記十八御覽十一與董仲連書穀糴驚踊告求周鄰日獲數斗猶復無薪可以熟之雖孟軻困于梁宋宣尼飢于陳蔡無以過此夫挾管晏之智者不有廝役之勞懷陶朱之慮者不居貧賤之地出蒙誚于臧獲入見謫于嬪息忽使己憤不知處世之為樂也藝文類聚三十五初學記十八與尚書諸郎書夫秋節涼和霖雨清閒正高會之盛時飲宴之良日也而陋巷之居無高密之宇壁立之室無旬朔之資流潦浸于北堂隙漏霑于衣服藁蒸單竭檐石傾罄中饋告乏役者莫興飯玉炊桂猶尚優泰雖欣皇天之降潤亮水車之思雨私懷蹙額良不可言想諸夫子亦斯困也夫否泰潛升蓋由昏明二三執事以龍虎之姿遭風雲之會方將飛騰閶闔振翼紫微運籌帷幄顯揚豐績豈久沈滯于下職契闊于貧悴哉藝文類聚三十五檀氏園葵菜繁茂藷蔗瓜芋亦離離尚萌未知三生復何種植御覽九百七十四與劉孔才書聽廣陵之清散文選嵇康琴賦注又謝靈運道路憶山中詩注又夢溪筆談五與梁州刺史劉文爽書足下內挹叔夷之清節外播二南之惠政德教加于百姓要道過于侏國之卿也書鈔與夏侯孝智書遭值有道之世免致貧賤之患援鑒自照鬢已半白良可懼也北堂書鈔一百三十六與洛陽令杜偉忠書羊寄虎穴鵲托鷹巢心懷怵惕豈其任哉北堂書鈔一百五十八與王子雍書卿校之從有職之事足下著書不起草占授數萬言言不改定事合古典莫不歎息之矣書鈔與母丘仲恭書客館不留賓官曹無停事書鈔與趙叔潛書入侍華幄出典禁闈文選陸機贈馮文羆遷斥丘令詩注與王將軍書雀鼠雖微猶知徽烈文選劉孝標廣絕交論注又任昉為范始興求立太宰碑表注劉峻廣絕交論注竝作雖愚與龐惠恭書頻見所上利民之術植濟南之榆栽漢中之漆藝文類聚八十八御覽九百五十六與西陽令孔德琰書嘉麥禎祥唯日未久不圖飛蝗一旦至止知恤蒸庶念存良苗親發赫斯爰整其旅鮐背之叟皓首之黎莫不負戈奔走于道路旌表曜于白日黿鼉震于雷動以此埽敵必將席卷況于微蟲能無驚駭卓茂治密恭在中牟時雖有災未若斯勤亦猶子賤鳴琴巫馬出入勞逸有殊立功惟一重雲比興不降靈雨麗此二災憂心忡惙逐蝗之道謹聞教矣不審致禳將以何物文王修德以厭地震湯禱桑林致克豐雨宜修善政以慰民望藝文類聚一百與楊生書與楊生書知楊生翻然遂登納言雖有所越亦其宜也傅說棄板築而為殷相呂望投釣竿而為周師卓茂起閭里而為漢宰若此貧者乃奇才耳璅璅尚書執憲之吏曷以為異哉御覽二百一十二與許子俊書與許子俊書前別倉卒情意不悉追懷萬恨文選任昉出郡傳舍哭范僕射詩注足下以方剛之盛年應不霸之勁勇將發虓虎之威致霜雪之誅擒吳梟蜀定功萬里而劉備不下山孫權不出水武力不奮猛氣畜勇其毒如何御覽四百三十七與崔元書與崔元書豈有亂首抗巾以入都城衣不在體而以適人乎昔戴叔鸞箕坐見邊文禮此皆衰世之慢行也御覽四百九十八與陰中夏書與陰中夏書從田來見南野之中有徒步之士怪而問之乃知郎君頃有微疴告祠社神將以祈福聞之悵然以增歎息虛社高樹能有靈應哉御覽五百三十二體正者則檢于人質弱者則陋于眾文選謝靈運還舊園作見顏范二中書詩注荅韓文憲書昔公孫宏皓首入學顏涿聚五十始涉師門朝聞道夕殞聖人所貴足下之年甫在不惑如以學蓺何晚之有若能上迨南榮忘食之樂下踵寍子黑夜之勤窮文盡義無微不綜規富貴之榮取金紫之爵是夏侯勝拾芥之謂也御覽六百一十四報燕中尉樊彥皇書攬袪登輿北踐燕路方當化銀龜以為黃變青組以為紫御覽八百十九報平陸長賁伯瑋書報平陸長賁伯瑋書從此辭矣何敢復飛蟬于惠文鳴玉于縞組哉御覽八百一十九與程文信書是以忽此蘇子帶郭之業永彼孫叔寢丘之地故求遠田在關之西南臨洛水北據芒山託崇岫以為宅因茂林以為蔭宋書謝靈運傳山居賦注文選齊竟陵王行狀注別作應瑒御覽八百二十一報東海相梁季然書足下頓彌天之網收萬仞之魚量之以谿谷數之以陔兆何其壯乎觀夫任公子之所釣此謂鰌鰕未足為吾子之道御覽八百三十四書左執屈盧之勁矛右秉干將之雄戟高冠拂雲長劍耿介蕭管振音厥聲載路馮軾虎視清風震疊可謂堂堂乎難與竝為仁矣御覽三百三十九清猿與壺人爭旦海錄碎事文選任彥昇齊竟陵王行狀有此語注不云應璩書張溥百三家集引海錄碎事當攷
