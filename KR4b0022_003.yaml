body:
  text: 應休璉集百一詩百一詩漢末桓帝時郎有馬子侯自謂識音律請客鳴笙竽為作陌上桑反言鳳將雛左右僞稱善亦復自搖頭御覽七百三十九作新論又書鈔百十作新詩引侯竽雛三韻杜公瞻編珠二作百一詩引雛一韻百郡立中正九州置都士州閭與郡縣希疏如馬齒生不相識面何緣別義理御覽二百六十五作應璩新論十室稱忠信觀過必黨里書鈔七十三作應璩新語平生居郭寧丁憂貧賤出門見富貴竈下炊牛矢甑中裝豆飯書鈔百四十四作新詩又御覽八百五十作新詩引飯一韻野田何紛紛城郭何落落埋葬嫁娶家皆是商旅客喪側食不飽酒肉紛狼籍御覽五百五十六作應璩新詩大魏承衰弊復欲密其羅蚍蜉猶見得何云鰌與蝦狴犴既已備欻復置黃沙御覽九百四十七事類賦蟻賦注作百一篇又御覽九百四十三引羅蝦二韻人才不能備各有偏短長稽可小人中便辟必知芒書鈔百四作新詩百三家集本集茫茫九州內莫作帝者民民有忠信行莫非帝者臣御覽六百二十一作新詩太官有餘廚大小無不賣豈徒脯與糗醯醢及鹽豉御覽八百二十八作新詩洛水禁罾罟魚鱉不為殖空令自相啖吏民不得食御覽八百三十四作新詩豐隆賜美味受嚼方呥呥鹿鳴吐野華獨食有何甘書鈔百四十三作新詩苟欲娛耳目快心樂腹腸我躬不悅歡安能慮死亡葛立方韻語陽秋槥車在道路征夫不得休魏志文帝紀有酒流如川有肉積如岑書鈔百四十五百四十八並作新詩革帶繩為續履舄穿無底御覽六百九十六作新詩嵐山寒折骨面目盡生瘡書鈔百五十六作應璩詩御覽三十四作新詩溝瀆皆決溢書鈔百五十一作新詩小兒撫塵書鈔十五雜詩雜詩秋日苦促短遙夜邈綿綿貧士感此時慷慨不能眠御覽二十五同前同前貧子語窮兒無錢可把撮耕自不得粟采彼北山葛簞瓢恆日在無用相呵喝初學記十八詩紀十七並作應瑗雜詩詩詩司隸鷹揚吏爪牙徒擢空折翅躍毛距宛鵛還入籠世人指為武誰復勵嚴冬書鈔六十一應璩詩京師何繽紛車馬相奔起借問乃爾為將欲要其仕孝廉經述通誰能應此舉詩乘補遺又書鈔七十九作應璩詩引起舉二韻及莫言有所為一句放戈釋甲胄乘軒入紫微從容侍帷幄光輔日月輝御覽三百三十九應璩詩丈夫要雄戟更來宿紫庭今者宅四海誰復有不并御覽三百五十三應璩詩郡國貪慕將馳騁習弓戟雖妙未更事難用應卒迫同上治化貴簡易法令不欲多書鈔二十七應璩詩城狐不可掘社鼠不可熏文選四十奏彈王源注應璩詩不誤牽朱絲三署來相尋文選二十六初去郡詩注事類絲賦注並作應璩詩詩酌彼春酒上得供養親老下得溫飽妻子書鈔百四十八應璩詩
